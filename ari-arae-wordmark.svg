<svg width="220" height="120" viewBox="0 0 220 120" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#3D4C6F"/>
    <stop offset="35%"  stop-color="#8BA888"/>
    <stop offset="75%"  stop-color="#C8BE5A"/>
    <stop offset="100%" stop-color="#D4CA6A"/>
  </linearGradient>
</defs>

<!-- ᄋᆞ syllable (x: 0-110) -->
<!-- ᄋ ieung: oval ring, left side of syllable -->
<!-- The oval takes up about 60% width, centered vertically -->
<ellipse cx="48" cy="58" rx="28" ry="30" stroke="url(#g)" stroke-width="9" fill="none"/>

<!-- ᆞ 아래아: dot on the right side of the syllable -->
<circle cx="90" cy="58" r="7" fill="url(#g)"/>

<!-- 리 syllable (x: 110-220) -->
<!-- ㄹ: left portion -->
<!-- Top horizontal stroke -->
<line x1="122" y1="20" x2="168" y2="20" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
<!-- Upper right vertical down -->
<line x1="168" y1="20" x2="168" y2="55" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
<!-- Middle horizontal stroke -->
<line x1="122" y1="55" x2="168" y2="55" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
<!-- Lower left vertical down -->
<line x1="122" y1="55" x2="122" y2="92" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
<!-- Bottom horizontal stroke -->
<line x1="122" y1="92" x2="175" y2="92" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>

<!-- ㅣ: right vertical line for 리 -->
<line x1="195" y1="15" x2="195" y2="105" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
</svg>